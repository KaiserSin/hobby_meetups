{% extends "base.html" %}

{% block title %}Edit Meetup{% endblock %}

{% block content %}
<section>
    <p><a href="{{ url_for('app.meetup_detail', meetup_id=meetup.id) }}">Back to meetup details</a></p>
</section>

<section>
    <h1>Edit meetup</h1>
    <form method="post" action="{{ url_for('app.edit_meetup', meetup_id=meetup.id) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <p>
            <label for="title">Title</label>
        </p>
        <p>
            <input id="title" name="title" type="text" value="{{ meetup.title }}" required>
        </p>

        <p>
            <label for="description">Description</label>
        </p>
        <p>
            <textarea id="description" name="description" required>{{ meetup.description }}</textarea>
        </p>

        <p>
            <label for="event_time">Date and time</label>
        </p>
        <p>
            <input
                id="event_time"
                name="event_time"
                type="datetime-local"
                value="{{ meetup.event_time|string|replace(' ', 'T') }}"
                required
            >
        </p>

        <p>
            <label for="location">Location</label>
        </p>
        <p>
            <input id="location" name="location" type="text" value="{{ meetup.location }}" required>
        </p>

        <fieldset>
            <legend>Categories</legend>
            {% for category in categories %}
            <p>
                <label>
                    <input
                        type="checkbox"
                        name="category_ids"
                        value="{{ category.id }}"
                        {% if category.id in meetup.category_ids %}checked{% endif %}
                    >
                    {{ category.name }}
                </label>
            </p>
            {% endfor %}
        </fieldset>

        <p>
            <button type="submit">Save changes</button>
        </p>
    </form>
</section>
{% endblock %}
