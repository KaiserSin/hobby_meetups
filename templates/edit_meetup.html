{% extends "base.html" %}

{% block title %}Edit Meetup{% endblock %}

{% block content %}
<section class="panel panel-compact">
    <div class="inline-actions">
        <a class="button button-secondary" href="{{ url_for('app.meetup_detail', meetup_id=meetup.id) }}">Back to meetup details</a>
    </div>
</section>

<section class="panel">
    <h1 class="panel-title">Edit meetup</h1>
    <p class="panel-subtitle">
        Update the meetup information and save your changes.
    </p>
    <form class="form" method="post" action="{{ url_for('app.edit_meetup', meetup_id=meetup.id) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-row">
            <label class="form-label" for="title">Title</label>
            <input class="form-input" id="title" name="title" type="text" value="{{ meetup.title }}" required>
        </div>

        <div class="form-row">
            <label class="form-label" for="description">Description</label>
            <textarea class="form-textarea" id="description" name="description" required>{{ meetup.description }}</textarea>
        </div>

        <div class="form-row">
            <label class="form-label" for="event_time">Date and time</label>
            <input
                class="form-input"
                id="event_time"
                name="event_time"
                type="datetime-local"
                value="{{ meetup.event_time|string|replace(' ', 'T') }}"
                required
            >
        </div>

        <div class="form-row">
            <label class="form-label" for="location">Location</label>
            <input class="form-input" id="location" name="location" type="text" value="{{ meetup.location }}" required>
        </div>

        <fieldset class="form-fieldset">
            <legend>Categories</legend>
            <div class="checkbox-list">
            {% for category in categories %}
                <label class="checkbox-option">
                    <input
                        type="checkbox"
                        name="category_ids"
                        value="{{ category.id }}"
                        {% if category.id in meetup.category_ids %}checked{% endif %}
                    >
                    {{ category.name }}
                </label>
            {% endfor %}
            </div>
        </fieldset>

        <div class="panel-actions">
            <button class="button" type="submit">Save changes</button>
            <a class="button button-secondary" href="{{ url_for('app.meetup_detail', meetup_id=meetup.id) }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
