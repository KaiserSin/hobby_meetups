{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="panel panel-compact">
    <div class="inline-actions">
        <a class="button button-secondary" href="{{ url_for('app.index') }}">Back to all meetups</a>
    </div>
</section>

<section class="panel">
    <h1 class="panel-title">Login</h1>
    <p class="panel-subtitle">
        Log in to create meetups, manage your own events, and join other users' meetups.
    </p>
    <form class="form" method="post" action="{{ url_for('app.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-row">
            <label class="form-label" for="username">Username</label>
            <input class="form-input" id="username" name="username" type="text" required>
        </div>

        <div class="form-row">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" id="password" name="password" type="password" required>
        </div>

        <div class="panel-actions">
            <button class="button" type="submit">Login</button>
            <a class="button button-secondary" href="{{ url_for('app.register') }}">Create an account</a>
        </div>
    </form>
</section>
{% endblock %}
