{% extends "base.html" %}

{% block title %}Create Meetup{% endblock %}

{% block content %}
<section class="panel panel-compact">
    <div class="inline-actions">
        <a class="button button-secondary" href="{{ url_for('app.index') }}">Back to all meetups</a>
    </div>
</section>

<section class="panel">
    <h1 class="panel-title">Create meetup</h1>
    <p class="panel-subtitle">
        Add the meetup details below and choose at least one category.
    </p>
    <form class="form" method="post" action="{{ url_for('app.create_meetup') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-row">
            <label class="form-label" for="title">Title</label>
            <input class="form-input" id="title" name="title" type="text" required>
        </div>

        <div class="form-row">
            <label class="form-label" for="description">Description</label>
            <textarea class="form-textarea" id="description" name="description" required></textarea>
        </div>

        <div class="form-row">
            <label class="form-label" for="event_time">Date and time</label>
            <input class="form-input" id="event_time" name="event_time" type="datetime-local" required>
        </div>

        <div class="form-row">
            <label class="form-label" for="location">Location</label>
            <input class="form-input" id="location" name="location" type="text" required>
        </div>

        <fieldset class="form-fieldset">
            <legend>Categories</legend>
            <div class="checkbox-list">
            {% for category in categories %}
                <label class="checkbox-option">
                    <input type="checkbox" name="category_ids" value="{{ category.id }}">
                    {{ category.name }}
                </label>
            {% endfor %}
            </div>
        </fieldset>

        <div class="panel-actions">
            <button class="button" type="submit">Create meetup</button>
            <a class="button button-secondary" href="{{ url_for('app.index') }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
