{% extends "base.html" %}

{% block title %}Create Meetup{% endblock %}

{% block content %}
<section>
    <p><a href="{{ url_for('app.index') }}">Back to all meetups</a></p>
</section>

<section>
    <h1>Create meetup</h1>
    <form method="post" action="{{ url_for('app.create_meetup') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <p>
            <label for="title">Title</label>
        </p>
        <p>
            <input id="title" name="title" type="text" required>
        </p>

        <p>
            <label for="description">Description</label>
        </p>
        <p>
            <textarea id="description" name="description" required></textarea>
        </p>

        <p>
            <label for="event_time">Date and time</label>
        </p>
        <p>
            <input id="event_time" name="event_time" type="datetime-local" required>
        </p>

        <p>
            <label for="location">Location</label>
        </p>
        <p>
            <input id="location" name="location" type="text" required>
        </p>

        <fieldset>
            <legend>Categories</legend>
            {% for category in categories %}
            <p>
                <label>
                    <input type="checkbox" name="category_ids" value="{{ category.id }}">
                    {{ category.name }}
                </label>
            </p>
            {% endfor %}
        </fieldset>

        <p>
            <button type="submit">Create meetup</button>
        </p>
    </form>
</section>
{% endblock %}
