<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hobby Meetups{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="site-brand">
                <h1><a href="{{ url_for('app.index') }}">Hobby Meetups</a></h1>
                <p>Find local activities and organize new meetups.</p>
            </div>

            <nav class="site-nav" aria-label="Primary">
                <a class="button button-secondary" href="{{ url_for('app.index') }}">All meetups</a>
                {% if current_user_id %}
                <a class="button" href="{{ url_for('app.create_meetup') }}">Create meetup</a>
                <form class="inline-form" method="post" action="{{ url_for('app.logout') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button class="button button-secondary" type="submit">Logout</button>
                </form>
                {% else %}
                <a class="button button-secondary" href="{{ url_for('app.login') }}">Login</a>
                <a class="button" href="{{ url_for('app.register') }}">Register</a>
                {% endif %}
            </nav>
        </header>

        <main class="main-content">
            {% if status_message %}
            <div class="status-message">{{ status_message }}</div>
            {% endif %}

            {% if error_message %}
            <div class="error-message">{{ error_message }}</div>
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
